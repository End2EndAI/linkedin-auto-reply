<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Reply Assistant</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <span class="popup-logo">🤖</span>
      <h1>Reply Assistant</h1>
    </div>

    <!-- Tabs -->
    <div class="popup-tabs">
      <button class="popup-tab active" data-tab="settings">⚙️ Settings</button>
      <button class="popup-tab" data-tab="templates-fr">🇫🇷 Templates</button>
      <button class="popup-tab" data-tab="templates-en">🇬🇧 Templates</button>
      <button class="popup-tab" data-tab="stats">📊 Stats</button>
    </div>

    <!-- Settings Tab -->
    <div class="popup-content" id="tab-settings">
      <div class="form-group">
        <label for="userName">Your full name</label>
        <input type="text" id="userName" placeholder="Louis FONTAINE">
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="autoDetect" checked>
          Auto-detect messages
        </label>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="showNotif" checked>
          Show detection notifications
        </label>
      </div>
      <button class="btn btn-primary" id="saveSettings">💾 Save</button>
    </div>

    <!-- French Templates Tab -->
    <div class="popup-content hidden" id="tab-templates-fr">
      <div class="template-section">
        <h3>💼 Job offer reply</h3>
        <textarea id="tpl-fr-job-offer" rows="6"></textarea>
      </div>
      <div class="template-section">
        <h3>🤝 Referral reply</h3>
        <textarea id="tpl-fr-cooptation" rows="5"></textarea>
      </div>
      <div class="template-section">
        <h3>💬 Other reply</h3>
        <textarea id="tpl-fr-other" rows="4"></textarea>
      </div>
      <p class="hint">Variables: <code>{firstName}</code> <code>{name}</code> <code>{userName}</code></p>
      <button class="btn btn-primary" id="saveTemplatesFr">💾 Save French templates</button>
      <button class="btn btn-secondary" id="resetTemplatesFr">🔄 Reset</button>
    </div>

    <!-- English Templates Tab -->
    <div class="popup-content hidden" id="tab-templates-en">
      <div class="template-section">
        <h3>💼 Job offer reply</h3>
        <textarea id="tpl-en-job-offer" rows="6"></textarea>
      </div>
      <div class="template-section">
        <h3>🤝 Referral reply</h3>
        <textarea id="tpl-en-cooptation" rows="5"></textarea>
      </div>
      <div class="template-section">
        <h3>💬 Other reply</h3>
        <textarea id="tpl-en-other" rows="4"></textarea>
      </div>
      <p class="hint">Variables: <code>{firstName}</code> <code>{name}</code> <code>{userName}</code></p>
      <button class="btn btn-primary" id="saveTemplatesEn">💾 Save English templates</button>
      <button class="btn btn-secondary" id="resetTemplatesEn">🔄 Reset</button>
    </div>

    <!-- Stats Tab -->
    <div class="popup-content hidden" id="tab-stats">
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-number" id="stat-analyzed">0</span>
          <span class="stat-label">Analyzed</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-copied">0</span>
          <span class="stat-label">Copied</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="stat-inserted">0</span>
          <span class="stat-label">Inserted</span>
        </div>
      </div>
      <button class="btn btn-secondary" id="resetStats">🗑️ Reset stats</button>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span>v1.1.0 — Made with 🤖 by Louis</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
